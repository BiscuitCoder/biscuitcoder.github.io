an><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">//新建 @/utils/excel.ts</span></span><br><span class="line"><span class="keyword">import</span> saveAs <span class="keyword">from</span> <span class="string">'file-saver'</span>;<span class="comment">//https://www.npmjs.com/package/file-saver</span></span><br><span class="line"><span class="keyword">import</span> ExcelJS <span class="keyword">from</span> <span class="string">'exceljs'</span>;<span class="comment">//https://github.com/exceljs/exceljs/blob/master/README_zh.md</span></span><br><span class="line"><span class="keyword">import</span> dayjs <span class="keyword">from</span> <span class="string">'dayjs'</span>;<span class="comment">//https://dayjs.fenxianglu.cn/</span></span><br><span class="line"><span class="keyword">import</span> * <span class="keyword">as</span> XLSX <span class="keyword">from</span> <span class="string">'xlsx'</span>;<span class="comment">//https://www.npmjs.com/package/xlsx</span></span><br><span class="line"><span class="keyword">import</span> &#123; Message &#125; <span class="keyword">from</span> <span class="string">'@arco-design/web-vue'</span>;<span class="comment">//https://arco.design/vue/component/message</span></span><br><span class="line"><span class="keyword">import</span> &#123; FileItem &#125; <span class="keyword">from</span> <span class="string">'@arco-design/web-vue/es/upload/interfaces'</span>;<span class="comment">//arco类型</span></span><br><span class="line"><span class="keyword">export</span> interface DownloadExcelPrams &#123;</span><br><span class="line">    columns: &#123; <span class="attr">title</span>: string, <span class="attr">key</span>: string &#125;[];</span><br><span class="line">    rows: object[];</span><br><span class="line">    name: string</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">//导出下载文件</span></span><br><span class="line"><span class="keyword">export</span> <span class="function"><span class="keyword">function</span> <span class="title">downloadExcel</span>(<span class="params">&#123; columns, rows, name = <span class="string">'未命名文件'</span> &#125;: DownloadExcelPrams</span>) </span>&#123;</span><br><span class="line">    <span class="built_in">console</span>.log(dayjs().format(<span class="string">'YYYY-MM-DD HH时mm分'</span>))</span><br><span class="line">    <span class="keyword">const</span> workbook = <span class="keyword">new</span> ExcelJS.Workbook();</span><br><span class="line">    workbook.creator = <span class="string">'Start-front'</span>;</span><br><span class="line">    workbook.lastModifiedBy = <span class="string">'Start-front'</span>;</span><br><span class="line">    workbook.created = <span class="keyword">new</span> <span class="built_in">Date</span>(<span class="number">1985</span>, <span class="number">8</span>, <span class="number">30</span>);</span><br><span class="line">    workbook.modified = <span class="keyword">new</span> <span class="built_in">Date</span>();</span><br><span class="line">    workbook.lastPrinted = <span class="keyword">new</span> <span class="built_in">Date</span>(<span class="number">2016</span>, <span class="number">9</span>, <span class="number">27</span>);</span><br><span class="line"></span><br><span class="line">    <span class="comment">// 将工作簿添加一个sheet页sheet1</span></span><br><span class="line">    <span class="keyword">const</span> sheet1 = workbook.addWorksheet(name);</span><br><span class="line">    <span class="comment">// 表头数据添加</span></span><br><span class="line">    sheet1.columns = columns.map(<span class="function"><span class="params">item</span> =&gt;</span> (&#123;</span><br><span class="line">        header: item.title,</span><br><span class="line">        key: item.key,</span><br><span class="line">        width: <span class="number">20</span></span><br><span class="line">    &#125;));</span><br><span class="line">    <span class="comment">// 表格内容添加</span></span><br><span class="line">    rows.map(<span class="function"><span class="params">item</span> =&gt;</span> sheet1.addRow(item));</span><br><span class="line">    workbook.xlsx.writeBuffer().then(<span class="function"><span class="params">buffer</span> =&gt;</span> &#123;</span><br><span class="line">        <span class="built_in">console</span>.log(buffer)</span><br><span class="line">        saveAs(</span><br><span class="line">            <span class="keyword">new</span> Blob([buffer], &#123; <span class="attr">type</span>: <span class="string">'application/octet-stream'</span> &#125;),</span><br><span class="line">            <span class="string">`<span class="subst">$&#123;name&#125;</span>(<span class="subst">$&#123;dayjs().format(<span class="string">'YYYY年MM月DD日HH时mm分'</span>)&#125;</span>导出).xlsx`</span></span><br><span class="line">        );</span><br><span class="line">    &#125;);</span><br><span class="line">&#125;;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">//读取文件为json格式</span></span><br><span class="line"><span class="keyword">export</span> <span class="function"><span class="keyword">function</span> <span class="title">readExcle</span>(<span class="params">fileItem:FileItem</span>) </span>&#123;</span><br><span class="line">    <span class="built_in">console</span>.log(<span class="string">'读取文件...'</span>,fileItem);</span><br><span class="line">    <span class="keyword">return</span> <span class="keyword">new</span> <span class="built_in">Promise</span>(<span class="function">(<span class="params">resove,reject</span>)=&gt;</span>&#123;</span><br><span class="line">        <span class="keyword">try</span> &#123;</span><br><span class="line">            <span class="keyword">let</span> workbook:XLSX.Sheet;</span><br><span class="line">            <span class="keyword">const</span> reader = <span class="keyword">new</span> FileReader();</span><br><span class="line">            reader.readAsBinaryString(fileItem.file <span class="keyword">as</span> File);<span class="comment">//发起异步请求</span></span><br><span class="line">            reader.onload = <span class="function"><span class="keyword">function</span>(<span class="params">ev</span>)</span>&#123;</span><br><span class="line">                <span class="keyword">const</span> data = ev.target?.result;</span><br><span class="line">                workbook = XLSX.read(data, &#123;<span class="attr">type</span>: <span class="string">'binary'</span>&#125;);</span><br><span class="line">                <span class="keyword">const</span> sheetNames = workbook.SheetNames; <span class="comment">// 工作表名称集合</span></span><br><span class="line">                sheetNames.forEach(<span class="function">(<span class="params">name:string</span>) =&gt;</span> &#123;</span><br><span class="line">                    <span class="keyword">var</span> worksheet = workbook.Sheets[name]; <span class="comment">// 只能通过工作表名称来获取指定工作表</span></span><br><span class="line">                    <span class="keyword">let</span> jsonres = XLSX.utils.sheet_to_json(worksheet);</span><br><span class="line">                    resove(jsonres)</span><br><span class="line">                &#125;);</span><br><span class="line">            &#125;<span class="comment">//onload</span></span><br><span class="line">        &#125; <span class="keyword">catch</span> (error) &#123;</span><br><span class="line">            Message.error(<span class="string">'读取失败,请选择正确文件'</span>);</span><br><span class="line">            reject(error);</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;)</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

span><br></pre></td><td class="code"><pre><span class="line">//在vue文件中使用</span><br><span class="line"><span class="tag">&lt;<span class="name">template</span>&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">div</span> <span class="attr">class</span>=<span class="string">"container"</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">a-row</span> <span class="attr">class</span>=<span class="string">"tableActionRow"</span>&gt;</span></span><br><span class="line">        <span class="tag">&lt;<span class="name">a-col</span> <span class="attr">:span</span>=<span class="string">"16"</span>&gt;</span></span><br><span class="line">          <span class="tag">&lt;<span class="name">a-space</span>&gt;</span></span><br><span class="line">            <span class="comment">&lt;!-- action="/"  --&gt;</span></span><br><span class="line">            <span class="tag">&lt;<span class="name">a-upload</span> @<span class="attr">change</span>=<span class="string">"onFileUpload"</span></span></span><br><span class="line"><span class="tag">              &gt;</span><span class="tag">&lt;<span class="name">template</span> #<span class="attr">upload-button</span></span></span><br><span class="line"><span class="tag">                &gt;</span><span class="tag">&lt;<span class="name">a-button</span>&gt;</span>批量导入<span class="tag">&lt;/<span class="name">a-button</span>&gt;</span><span class="tag">&lt;/<span class="name">template</span></span></span><br><span class="line"><span class="tag">              &gt;</span><span class="tag">&lt;/<span class="name">a-upload</span></span></span><br><span class="line"><span class="tag">            &gt;</span></span><br><span class="line">          <span class="tag">&lt;/<span class="name">a-space</span>&gt;</span></span><br><span class="line">        <span class="tag">&lt;/<span class="name">a-col</span>&gt;</span></span><br><span class="line">        <span class="comment">&lt;!-- col 16 --&gt;</span></span><br><span class="line"></span><br><span class="line">        <span class="tag">&lt;<span class="name">a-col</span> <span class="attr">:span</span>=<span class="string">"8"</span> <span class="attr">style</span>=<span class="string">"text-align: right"</span>&gt;</span></span><br><span class="line">          <span class="tag">&lt;<span class="name">a-button</span> @<span class="attr">click</span>=<span class="string">"generateExcel()"</span></span></span><br><span class="line"><span class="tag">            &gt;</span><span class="tag">&lt;<span class="name">template</span> #<span class="attr">icon</span>&gt;</span><span class="tag">&lt;<span class="name">icon-download</span> /&gt;</span><span class="tag">&lt;/<span class="name">template</span>&gt;</span>下载<span class="tag">&lt;/<span class="name">a-button</span></span></span><br><span class="line"><span class="tag">          &gt;</span></span><br><span class="line">        <span class="tag">&lt;/<span class="name">a-col</span>&gt;</span></span><br><span class="line">        <span class="comment">&lt;!-- col8 --&gt;</span></span><br><span class="line">      <span class="tag">&lt;/<span class="name">a-row</span>&gt;</span></span><br><span class="line">      <span class="comment">&lt;!-- tableActionRow --&gt;</span></span><br><span class="line">  <span class="tag">&lt;/<span class="name">div</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">template</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;<span class="name">script</span> <span class="attr">lang</span>=<span class="string">"ts"</span>&gt;</span></span><br><span class="line"><span class="javascript"><span class="keyword">import</span> &#123; downloadExcel, DownloadExcelPrams, readExcle &#125; <span class="keyword">from</span> <span class="string">'@/utils/excel'</span>;</span></span><br><span class="line"></span><br><span class="line"><span class="javascript"><span class="keyword">export</span> <span class="keyword">default</span> defineComponent(&#123;</span></span><br><span class="line">  setup() &#123;</span><br><span class="line"></span><br><span class="line"><span class="actionscript">    <span class="keyword">const</span> state = reactive(&#123;</span></span><br><span class="line"><span class="actionscript">      renderData: [] <span class="keyword">as</span> object[]<span class="comment">//换成自己的数据源即可，具体格式看文档</span></span></span><br><span class="line">    &#125;);</span><br><span class="line"></span><br><span class="line"><span class="actionscript">    <span class="comment">// 下载表格</span></span></span><br><span class="line"><span class="javascript">    <span class="keyword">const</span> generateExcel = <span class="function"><span class="params">()</span>=&gt;</span>&#123;</span></span><br><span class="line"><span class="javascript">      <span class="keyword">let</span> params:DownloadExcelPrams = &#123;</span></span><br><span class="line"><span class="actionscript">        columns:[&#123;title: <span class="string">'ID'</span>,key: <span class="string">'id'</span>&#125;,&#123;title: <span class="string">'合集名称'</span>,key: <span class="string">'name'</span>&#125;],</span></span><br><span class="line"><span class="javascript">        rows:state.renderData.map(<span class="function"><span class="params">v</span>=&gt;</span>(&#123;<span class="string">"key"</span>:v.id,<span class="string">"name"</span>:v.name,<span class="string">"id"</span>:v.id&#125;)),</span></span><br><span class="line"><span class="actionscript">        name:<span class="string">'测试表格'</span></span></span><br><span class="line">      &#125;</span><br><span class="line"><span class="javascript">      <span class="built_in">console</span>.log(params)</span></span><br><span class="line">      downloadExcel(params);</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line"><span class="actionscript">    <span class="comment">// 文件上传读取流</span></span></span><br><span class="line"><span class="javascript">    <span class="keyword">const</span> onFileUpload = <span class="keyword">async</span> (fileList:[],<span class="attr">fileItem</span>:any)=&gt;&#123;</span></span><br><span class="line"><span class="javascript">      <span class="keyword">let</span> data = <span class="keyword">await</span> readExcle(fileItem);</span></span><br><span class="line"><span class="javascript">      <span class="built_in">console</span>.log(<span class="string">'读取结果'</span>,data)</span></span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line"><span class="actionscript">    <span class="keyword">return</span> &#123;</span></span><br><span class="line">      generateExcel,</span><br><span class="line">      onFileUpload</span><br><span class="line">    &#125;;</span><br><span class="line"><span class="actionscript">  &#125;, <span class="comment">//setup</span></span></span><br><span class="line">&#125;);</span><br><span class="line"><span class="tag">&lt;/<span class="name">script</span>&gt;</span></span><br></pre></td></tr></table></figure>
